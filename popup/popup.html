<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>X-Boost</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="popup">
      <header class="popup-header">X-Boost</header>
      <section class="stats">
        <div class="stat-card">
          <span class="stat-label">Queue</span>
          <span id="stat-queue" class="stat-value" aria-live="polite">0</span>
        </div>
      </section>
      <section class="block">
        <label class="row row-toggle">
          <span class="label">Refresh Home</span>
          <span class="toggle">
            <input type="checkbox" id="toggle-refresh" />
            <span class="toggle-slider"></span>
          </span>
        </label>
        <div class="row row-input">
          <span class="label">Every</span>
          <div class="stepper">
            <button type="button" id="refresh-minus" class="stepper-btn" aria-label="Decrease">
              −
            </button>
            <input
              type="number"
              id="refresh-interval"
              min="30"
              max="300"
              value="60"
              class="input"
            />
            <button type="button" id="refresh-plus" class="stepper-btn" aria-label="Increase">
              +
            </button>
          </div>
          <span class="unit">s</span>
        </div>
      </section>
      <section class="block">
        <label class="row row-toggle">
          <span class="label">Auto Scroll</span>
          <span class="toggle">
            <input type="checkbox" id="toggle-scroll" />
            <span class="toggle-slider"></span>
          </span>
        </label>
        <div class="row row-input">
          <span class="label">Every</span>
          <div class="stepper">
            <button type="button" id="scroll-minus" class="stepper-btn" aria-label="Decrease">
              −
            </button>
            <input type="number" id="scroll-interval" min="2" max="15" value="5" class="input" />
            <button type="button" id="scroll-plus" class="stepper-btn" aria-label="Increase">
              +
            </button>
          </div>
          <span class="unit">s</span>
        </div>
      </section>
      <section class="block">
        <label class="row row-toggle">
          <span class="label">Auto Like Feed</span>
          <span class="toggle">
            <input type="checkbox" id="toggle-enabled" />
            <span class="toggle-slider"></span>
          </span>
        </label>
        <div class="row row-input">
          <span class="label">Delay</span>
          <div class="stepper">
            <button type="button" id="delay-minus" class="stepper-btn" aria-label="Decrease">
              −
            </button>
            <input type="number" id="delay" min="1" max="10" value="10" class="input" />
            <button type="button" id="delay-plus" class="stepper-btn" aria-label="Increase">
              +
            </button>
          </div>
          <span class="unit">s</span>
        </div>
      </section>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
